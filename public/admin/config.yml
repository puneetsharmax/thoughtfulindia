backend:
  name: github
  repo: puneetsharmax/thoughtfulindia
  branch: main
  base_url: https://thoughtfulindia-oauth.puneetsharmax.workers.dev

media_folder: public/images/uploads
public_folder: /images/uploads
site_url: https://thoughtfulindia.com
display_url: https://thoughtfulindia.com
locale: en

collections:
  - name: posts
    label: Articles
    label_singular: Article
    folder: content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    preview_path: /post/{{fields.slug}}
    fields:
      - {label: Title, name: title, widget: string, required: true}
      - {label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", time_format: false}
      - {label: Slug, name: slug, widget: string, pattern: ["^[a-z0-9-]+$", "Only lowercase letters, numbers, and hyphens"]}
      - {label: Featured Image, name: featured_image, widget: image, required: false}
      - label: Categories
        name: categories
        widget: select
        multiple: true
        options:
          - BOLLYWOOD
          - BOOKS
          - BUSINESS
          - CULTURE
          - ENTERTAINMENT
          - FASHION
          - FEATURED STORIES
          - FOOD
          - HEALTH & SPIRITUALITY
          - HOLLYWOOD
          - INDIA POLITICS
          - INTERESTING
          - LIFESTYLE
          - NAPERVILLE LIVING
          - POLITICS
          - RELATIONSHIPS
          - TECH
          - WORLD
      - {label: Tags, name: tags, widget: list, required: false}
      - {label: Draft, name: draft, widget: boolean, default: false}
      - {label: Body, name: body, widget: markdown, modes: [rich_text, raw]}
